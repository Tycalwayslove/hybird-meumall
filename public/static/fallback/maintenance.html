<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>维护中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f3ff;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(360px, calc(100vw - 40px));
      }
      .mark {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background: #7c3aed;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>服务维护中</h1>
      <p>页面正在维护，稍后会恢复访问。此页面可由 manifest 或原生容器切换展示。</p>
    </main>
  </body>
</html>
